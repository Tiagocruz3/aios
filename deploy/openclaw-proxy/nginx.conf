# OpenClaw API proxy for a Hostinger VPS using nginx.
#
# Add this location block INSIDE the existing server { } that serves your
# website. Place it before any SPA "try_files ... /index.html" fallback so
# /v1/* is handled by the gateway, not the website.
#
# Replace the upstream with the gateway address reachable from this server.

location /v1/ {
    proxy_pass         http://127.0.0.1:18789;   # gateway origin (no trailing path)
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   Authorization     $http_authorization;  # forward bearer token
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_buffering     off;   # allow streaming responses (SSE) to pass through
}
