# OpenClaw API proxy for a Hostinger VPS using Apache + mod_proxy.
#
# Requires: a2enmod proxy proxy_http  (then restart Apache).
# Add inside the <VirtualHost> that serves your website. ProxyPass rules are
# evaluated in order, so keep /v1/ above any catch-all to index.html.
#
# Replace the upstream with the gateway address reachable from this server.

ProxyPreserveHost On
ProxyRequests Off

ProxyPass        /v1/  http://127.0.0.1:18789/v1/  timeout=120
ProxyPassReverse /v1/  http://127.0.0.1:18789/v1/
